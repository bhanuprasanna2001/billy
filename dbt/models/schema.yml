version: 2

sources:
  - name: credit_domino
    database: credit_domino
    schema: public
    tables:
      - name: customers
        description: Cleaned customer data from Kaggle credit risk dataset
        columns:
          - name: customer_id
            description: Unique customer identifier (CUST_N format)
            tests:
              - unique
              - not_null
          - name: person_age
            description: Customer age in years
            tests:
              - not_null
          - name: loan_status
            description: Loan default indicator (0=no default, 1=default)
            tests:
              - accepted_values:
                  arguments:
                    values: [0, 1]
          - name: person_income
            description: Annual income in dollars
            tests:
              - not_null

      - name: relationships
        description: Relationship graph edges (synthetic or Prosper lending network)
        columns:
          - name: src_customer_id
            tests:
              - not_null
          - name: dst_customer_id
            tests:
              - not_null
          - name: edge_type
            tests:
              - accepted_values:
                  arguments:
                    values: ['co-borrower', 'guarantor', 'employer', 'loan']

      - name: raw_scoring_events
        description: Raw scoring event stream (populated by API, consumed by dbt)
        columns:
          - name: scoring_event_id
            description: Unique event identifier (UUID generated by API)
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: risk_score
            tests:
              - not_null

      - name: graph_features
        description: Pre-computed graph features (degree, centrality, contagion metrics)
        columns:
          - name: customer_id
            description: Customer identifier matching customers table
            tests:
              - unique
              - not_null
          - name: degree
            tests:
              - not_null
          - name: in_degree
          - name: out_degree
          - name: norm_in_degree
          - name: norm_out_degree
          - name: pagerank
            tests:
              - not_null
          - name: distance_to_prior_default
          - name: clustering_coefficient
          - name: neighbor_default_frac
          - name: neighbor_default_frac_2hop

models:
  - name: stg_customers
    description: Cleaned, type-cast staging layer for customer data
    columns:
      - name: customer_id
        description: Unique customer ID
        tests:
          - unique
          - not_null

  - name: stg_relationships
    description: Validated relationship edges
    columns:
      - name: src_customer_id
        tests:
          - not_null
      - name: dst_customer_id
        tests:
          - not_null
      - name: validated_edge_type
        tests:
          - accepted_values:
              arguments:
                values: ['co-borrower', 'guarantor', 'employer', 'loan', 'unknown']

  - name: stg_graph_features
    description: Staging layer for pre-computed graph features
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: degree
        tests:
          - not_null
      - name: pagerank
        tests:
          - not_null

  - name: fct_credit_features
    description: Feature mart for model training and scoring
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: person_income
        tests:
          - not_null
      - name: loan_percent_income
        tests:
          - not_null
      - name: person_emp_length
        tests:
          - not_null
      - name: loan_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

  - name: fct_scoring_log
    description: Incremental model for scoring events (later synced to ClickHouse)
    columns:
      - name: scoring_event_id
        description: Unique event identifier
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: risk_score
        tests:
          - not_null
      - name: decision_band
        tests:
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'high']
